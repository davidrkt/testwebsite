		<script>
			function openImage(id) {
				document.getElementById("FULL_IMAGE").style.display = "inline";
				document.getElementById("THE_IMAGE").style.display = "inline";
				if(id==1){
					document.getElementById("THE_IMAGE").src="erga/erg1.png";

				}else if(id==6){

				}
			}
			function closeImage() {
				document.getElementById("FULL_IMAGE").style.display = "none";
